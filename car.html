<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio Vroom | Meet Your New Family Member</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--sky:#C8E8F4;--sky-soft:#eaf6fb;--cream:#FDF8F2;--cream-2:#f7efe4;--orange:#F4A261;--orange-deep:#e8814a;--brown:#3A3028;--brown-soft:#6b5d50}
    html{scroll-behavior:smooth}
    body{font-family:'Nunito',sans-serif;color:var(--brown);background:var(--cream);line-height:1.6}
    h1,h2,h3{font-family:'Playfair Display',serif;font-weight:600;line-height:1.14;color:var(--brown)}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    .wrap{max-width:1120px;margin:0 auto;padding:0 28px}

    nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:12px 32px;background:rgba(253,248,242,.92);backdrop-filter:blur(14px);box-shadow:0 4px 22px rgba(58,48,40,.08)}
    .nav-logo img{height:40px;object-fit:contain}
    .nav-links{display:flex;gap:4px;list-style:none;align-items:center}
    .nav-links a{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:9px 14px;border-radius:10px;color:var(--brown);transition:.2s}
    .nav-links a:hover{background:rgba(244,162,97,.18);color:var(--orange-deep)}
    .nav-cta{background:var(--orange)!important;color:#fff!important;border-radius:24px;padding:10px 18px!important}
    @media(max-width:680px){.nav-links a:not(.nav-cta){display:none}}

    .back{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:14px;color:var(--brown-soft);margin-bottom:22px}
    .back:hover{color:var(--orange-deep)}
    main{padding:112px 0 40px}

    .detail{display:grid;grid-template-columns:1.15fr 1fr;gap:44px;align-items:start}
    .media{border-radius:24px;overflow:hidden;background:var(--sky);box-shadow:0 16px 46px rgba(58,48,40,.16);aspect-ratio:4/3}
    .media img{width:100%;height:100%;object-fit:cover}
    .status-badge{display:inline-block;font-size:12.5px;font-weight:800;letter-spacing:.05em;color:var(--orange-deep);margin-bottom:10px}
    .car-title{font-size:clamp(38px,6vw,60px);font-weight:500;font-style:italic;margin-bottom:6px}
    .car-sub{font-size:17px;color:var(--brown-soft);margin-bottom:16px}
    .tagline{font-family:'Playfair Display',serif;font-style:italic;font-size:20px;color:var(--orange-deep);margin-bottom:22px}
    .fee-box{background:#fff;border-radius:18px;padding:18px 22px;box-shadow:0 6px 20px rgba(58,48,40,.08);display:inline-flex;flex-direction:column;margin-bottom:26px}
    .fee-box span{font-size:11.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--brown-soft)}
    .fee-box strong{font-family:'Playfair Display',serif;font-size:34px;color:var(--orange-deep)}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:26px}
    .btn{display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:14px;padding:13px 22px;border-radius:26px;transition:.2s;cursor:pointer;border:0}
    .btn-primary{background:var(--orange);color:#fff;box-shadow:0 8px 20px rgba(232,129,74,.32)}
    .btn-primary:hover{background:var(--orange-deep)}
    .btn-line{background:#fff;color:var(--brown);border:1.5px solid var(--cream-2)}
    .btn-line:hover{border-color:var(--orange);color:var(--orange-deep)}
    .carfax-link{background:#eaf6fb;color:#2C3E6B;border:1px solid #cfe8f4}
    .carfax-link:hover{background:#2C3E6B;color:#fff}
    .at-link{background:#fdf1e2;color:#b45f2b;border:1px solid #f4d9bd}
    .at-link:hover{background:#e8814a;color:#fff}

    .health{margin-top:52px;background:var(--sky-soft);border-radius:22px;padding:34px}
    .health h2{font-size:24px;margin-bottom:20px}
    .spec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:18px}
    .spec{background:#fff;border-radius:14px;padding:16px 18px}
    .spec span{display:block;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--brown-soft);margin-bottom:4px}
    .spec strong{font-size:17px;font-weight:700}

    .office{margin-top:34px;background:#fff;border-radius:22px;padding:32px;display:grid;grid-template-columns:1fr 1fr;gap:24px;box-shadow:0 6px 22px rgba(58,48,40,.07)}
    .office h3{font-size:19px;margin-bottom:10px}
    .office p{font-size:14.5px;color:var(--brown-soft);line-height:1.7}
    .office a{color:var(--orange-deep);font-weight:700}

    .notfound{padding:160px 24px;text-align:center}
    .notfound h1{font-size:40px;margin-bottom:14px}

    footer{background:var(--brown);color:#c9beb1;padding:44px 0;text-align:center;margin-top:56px;font-size:13.5px}
    footer .tag{font-family:'Playfair Display',serif;font-style:italic;color:var(--sky);font-size:15px;margin-bottom:8px}
    footer a{color:var(--sky)}

    @media(max-width:820px){.detail{grid-template-columns:1fr;gap:26px}.office{grid-template-columns:1fr}}
    .chat-fab{position:fixed;right:22px;bottom:22px;z-index:190;display:inline-flex;align-items:center;gap:10px;background:var(--orange);color:#fff;padding:13px 22px 13px 16px;border-radius:34px;box-shadow:0 12px 30px rgba(232,129,74,.42);font-weight:800;font-size:14px;transition:transform .2s,box-shadow .2s,background .2s}
    .chat-fab:hover{background:var(--orange-deep);transform:translateY(-3px);box-shadow:0 16px 38px rgba(232,129,74,.5)}
    .chat-fab svg{width:23px;height:23px;fill:#fff;flex:none}
    @media(max-width:680px){.chat-fab{right:14px;bottom:14px;padding:13px 16px 13px 13px}.chat-fab .chat-txt{display:none}}
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="index.html"><img src="Logo/01 Pics 850 Grayscale on Transparent.png" alt="Studio Vroom" /></a>
    <ul class="nav-links">
      <li><a href="index.html#family">Our Family</a></li>
      <li><a href="index.html#process">How to Adopt</a></li>
      <li><a href="index.html#adopted">Adopted</a></li>
      <li><a href="index.html#contact" class="nav-cta">Contact Us</a></li>
    </ul>
  </nav>

  <main class="wrap" id="main">
    <a class="back" href="index.html#family">&larr; Back to Our Family</a>
    <div id="content"><p style="color:var(--brown-soft)">Loading&hellip;</p></div>
  </main>

  <a class="chat-fab" href="https://m.me/100530205236545" target="_blank" rel="noopener" aria-label="Chat with us on Messenger">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.36 2 2 6.13 2 11.7c0 2.91 1.19 5.44 3.14 7.17.16.15.26.35.27.57l.05 1.78c.03.57.62.94 1.14.71l1.99-.88c.17-.07.36-.09.54-.04 1 .27 2.06.42 3.13.42 5.64 0 10-4.13 10-9.7S17.64 2 12 2Zm6 7.46-2.94 4.66c-.47.74-1.47.93-2.17.4l-2.34-1.75a.6.6 0 0 0-.72 0l-3.16 2.4c-.42.32-.97-.18-.69-.63l2.94-4.66c.47-.74 1.47-.93 2.17-.4l2.34 1.75a.6.6 0 0 0 .72 0l3.16-2.4c.42-.32.97.18.69.63Z"/></svg>
    <span class="chat-txt">Chat with us</span>
  </a>

  <footer>
    <div class="wrap">
      <p class="tag">The World's First Car Adoption Agency &#129525;</p>
      <p>Studio Vroom &middot; 860 Eagle Dr, Bensenville, IL 60106 &middot; <a href="tel:2247162703">(224) 716-2703</a></p>
    </div>
  </footer>

  <script>
    var FAMILY_SHEET_CSV = "https://docs.google.com/spreadsheets/d/1zluzwZ9pzMfKtdlbhKxosIIQbHNExAK-yM_oc5rPBrY/gviz/tq?tqx=out:csv&gid=0";
    var NAME_POOL=["Sunny","Luna","Ruby","Ace","Bluey","Cleo","Cooper","Daisy","Echo","Finn","Ginger","Hazel","Ivy","Jasper","Koda","Lily","Milo","Nova","Olive","Pepper","Quill","Rusty","Scout","Teddy","Uma","Violet","Willow","Ziggy","Biscuit","Mango","Bruno","Coco","Dexter","Ellie","Frankie","Gus","Honey","Indigo","Juno","Kiwi","Loki","Maple","Nemo","Otis","Piper","Rocky","Simba","Tilly","Waffle","Zoe"];

    function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
    function slugify(s){return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');}
    function resolvePhoto(v){v=(v||'').trim();if(!v)return 'images/placeholder-car.svg';if(/^https?:\/\//i.test(v))return v;if(v.indexOf('/')>=0){return v.split('/').map(encodeURIComponent).join('/');}return 'cars/'+encodeURIComponent(v);}
    function parseCSV(text){var rows=[],row=[],cur='',q=false;for(var i=0;i<text.length;i++){var c=text[i];if(q){if(c=='"'){if(text[i+1]=='"'){cur+='"';i++;}else{q=false;}}else{cur+=c;}}else{if(c=='"'){q=true;}else if(c==','){row.push(cur);cur='';}else if(c=='\n'){row.push(cur);rows.push(row);row=[];cur='';}else if(c=='\r'){}else{cur+=c;}}}if(cur!==''||row.length){row.push(cur);rows.push(row);}return rows;}
    function qparam(k){return decodeURIComponent((new RegExp('[?&]'+k+'=([^&]*)').exec(location.search)||[,''])[1]).replace(/\+/g,' ');}

    var content=document.getElementById('content');

    fetch(FAMILY_SHEET_CSV).then(function(r){return r.text();}).then(function(t){
      var rows=parseCSV(t); if(rows.length<2){ notfound(); return; }
      var head=rows[0].map(function(h){return h.trim().toLowerCase();});
      function col(r,name){var i=head.indexOf(name);return i<0?'':(r[i]||'').trim();}
      // reserve typed names first (identical to index.html)
      var used={};
      for(var j=1;j<rows.length;j++){var en=col(rows[j],'name');if(en){used[en.toLowerCase()]=1;}}
      function autoName(seed){var s=(seed||'').toLowerCase(),hsh=0,i;for(i=0;i<s.length;i++){hsh=(hsh*31+s.charCodeAt(i))>>>0;}var p=hsh%NAME_POOL.length;for(var n=0;n<NAME_POOL.length;n++){var cand=NAME_POOL[(p+n)%NAME_POOL.length];if(!used[cand.toLowerCase()]){used[cand.toLowerCase()]=1;return cand;}}var fb=NAME_POOL[p]+' '+((hsh%99)+1);used[fb.toLowerCase()]=1;return fb;}

      var want=(qparam('car')||'').toLowerCase();
      var wantName=(qparam('name')||'').toLowerCase();
      var found=null;
      for(var k=1;k<rows.length;k++){
        var r=rows[k]; if(!r||r.join('').trim()==='') continue;
        var status=(col(r,'status')||'available').toLowerCase(); if(status.indexOf('adopt')>=0) continue;
        var raw=[col(r,'year'),col(r,'make'),col(r,'model'),col(r,'trim')].filter(Boolean).join(' ');
        var name=col(r,'name'); if(!name){ name=autoName(raw+'|'+col(r,'mileage')); }
        var slug=slugify(raw+' '+col(r,'mileage').replace(/,/g,''));
        if((want&&slug===want)||(wantName&&name.toLowerCase()===wantName)){ found={r:r,col:col,name:name,raw:raw,status:status}; break; }
      }
      if(!found){ notfound(); return; }
      render(found);
    }).catch(function(){ notfound(); });

    function notfound(){
      content.innerHTML='<div class="notfound"><h1>We couldn\'t find that one &#129525;</h1><p style="color:var(--brown-soft);margin-bottom:22px">This family member may have already found a home. Come meet the rest.</p><a class="btn btn-primary" href="index.html#family">See Our Family</a></div>';
    }

    function render(f){
      var col=f.col, r=f.r, name=f.name;
      var year=col(r,'year'),make=col(r,'make'),model=col(r,'model'),trim=col(r,'trim'),mileage=col(r,'mileage');
      var fee=col(r,'fee'); var feeTxt=fee?(/^\$?[\d,]+$/.test(fee)?'$'+Number(fee.replace(/[^0-9]/g,'')).toLocaleString():fee):'Ask';
      var tagline=col(r,'tagline'), carfax=col(r,'carfax'), autot=col(r,'autotrader');
      var status=f.status, badge=status.indexOf('feature')>=0?'⭐ Featured':(status.indexOf('pend')>=0?'⏳ Pending':'💙 Available');
      var mi=mileage?(/^\d+$/.test(mileage.replace(/,/g,''))?Number(mileage.replace(/,/g,'')).toLocaleString()+' mi':mileage):'';
      document.title='Studio Vroom | '+name+' — '+f.raw;
      var subject=encodeURIComponent('Adoption inquiry: '+name+' ('+f.raw+')');
      var specs=[['Year',year],['Make',make],['Model',model],['Trim',trim],['Mileage',mi]].filter(function(x){return x[1];})
        .map(function(x){return '<div class="spec"><span>'+x[0]+'</span><strong>'+esc(x[1])+'</strong></div>';}).join('');
      content.innerHTML=
        '<div class="detail">'
        +'<div class="media"><img src="'+resolvePhoto(col(r,'photo'))+'" onerror="this.onerror=null;this.src=\'images/placeholder-car.svg\'" alt="'+esc(name)+'" /></div>'
        +'<div class="info">'
        +'<span class="status-badge">'+badge+'</span>'
        +'<h1 class="car-title">'+esc(name)+'</h1>'
        +'<p class="car-sub">'+esc(f.raw)+(mi?' · '+esc(mi):'')+'</p>'
        +(tagline?'<p class="tagline">“'+esc(tagline)+'”</p>':'')
        +'<div class="fee-box"><span>Adoption Fee</span><strong>'+esc(feeTxt)+'</strong></div>'
        +'<div class="actions">'
        +'<a class="btn btn-primary" href="mailto:info@studio-vroom.com?subject='+subject+'">💙 Ask to Adopt</a>'
        +'<a class="btn btn-line" href="tel:2247162703">📞 Call</a>'
        +'<a class="btn btn-line" href="sms:2247162703">💬 Text</a>'
        +'</div>'
        +((carfax||autot)?('<div class="actions">'
            +(carfax?'<a class="btn carfax-link" href="'+esc(carfax)+'" target="_blank" rel="noopener">🔍 CARFAX Report</a>':'')
            +(autot?'<a class="btn at-link" href="'+esc(autot)+'" target="_blank" rel="noopener">🚗 View on Autotrader</a>':'')
          +'</div>'):'')
        +'</div>'
        +'</div>'
        +'<div class="health"><h2>Health &amp; Background</h2><div class="spec-grid">'+specs+'</div></div>'
        +'<div class="office">'
          +'<div><h3>Come Visit</h3><p>860 Eagle Dr, Bensenville, IL 60106<br><a href="https://maps.app.goo.gl/WuVvDdQnndSTCDySA" target="_blank">Get directions &rarr;</a></p></div>'
          +'<div><h3>Hours &amp; Contact</h3><p>Mon&ndash;Fri: 10am&ndash;7pm &middot; Sat: 10am&ndash;3pm<br>Sun: Closed &middot; By appointment<br><a href="tel:2247162703">(224) 716-2703</a> &middot; <a href="mailto:info@studio-vroom.com">info@studio-vroom.com</a></p></div>'
        +'</div>';
    }
  </script>
</body>
</html>
