<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- House roof -->
  <path d="M8 22 L24 8 L40 22" stroke="#2C3E6B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- House body -->
  <path d="M12 20 L12 40 L36 40 L36 20" stroke="#2C3E6B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Door -->
  <path d="M20 40 L20 31 Q20 28 24 28 Q28 28 28 31 L28 40" stroke="#2C3E6B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Door knob -->
  <circle cx="27" cy="34" r="1.2" fill="#e8704a"/>
  <!-- Left window -->
  <rect x="13" y="24" width="7" height="6" rx="1.5" stroke="#e8704a" stroke-width="1.8" fill="rgba(200,232,244,0.4)"/>
  <!-- Right window -->
  <rect x="28" y="24" width="7" height="6" rx="1.5" stroke="#e8704a" stroke-width="1.8" fill="rgba(200,232,244,0.4)"/>
  <!-- Chimney -->
  <rect x="30" y="9" width="5" height="8" rx="1" stroke="#2C3E6B" stroke-width="2" fill="white"/>
  <!-- Smoke -->
  <path d="M32 8 Q31 5 33 3" stroke="#2C3E6B" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>