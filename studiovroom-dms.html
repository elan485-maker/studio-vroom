<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef, createContext, useContext } = React;

// ==================== DATABASE (IndexedDB) ====================
const DB_NAME = 'StudioVroomDMS';
const DB_VERSION = 2;
const STORES = ['vehicles', 'customers', 'deals', 'expenses', 'settings', 'prospects'];

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      STORES.forEach(name => {
        if (!db.objectStoreNames.contains(name)) {
          db.createObjectStore(name, { keyPath: 'id' });
        }
      });
    };
  });
}

async function dbGetAll(store) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(store, item) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put(item);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbDelete(store, id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

// ==================== CONTEXT ====================
const AppContext = createContext();

function AppProvider({ children }) {
  const [vehicles, setVehicles] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [deals, setDeals] = useState([]);
  const [expenses, setExpenses] = useState([]);
  const [prospects, setProspects] = useState([]);
  const [loading, setLoading] = useState(true);

  const loadAll = useCallback(async () => {
    try {
      const [v, c, d, e, p] = await Promise.all([
        dbGetAll('vehicles'), dbGetAll('customers'), dbGetAll('deals'), dbGetAll('expenses'), dbGetAll('prospects')
      ]);
      setVehicles(v); setCustomers(c); setDeals(d); setExpenses(e); setProspects(p);
    } catch(err) { console.error('DB load error:', err); }
    setLoading(false);
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  const saveVehicle = async (v) => { const item = { ...v, id: v.id || genId(), updatedAt: new Date().toISOString() }; if (!v.id) item.createdAt = new Date().toISOString(); await dbPut('vehicles', item); await loadAll(); return item; };
  const deleteVehicle = async (id) => { await dbDelete('vehicles', id); setVehicles(prev => prev.filter(v => v.id !== id)); };
  const saveCustomer = async (c) => { const item = { ...c, id: c.id || genId(), updatedAt: new Date().toISOString() }; if (!c.id) item.createdAt = new Date().toISOString(); await dbPut('customers', item); await loadAll(); return item; };
  const deleteCustomer = async (id) => { await dbDelete('customers', id); setCustomers(prev => prev.filter(c => c.id !== id)); };
  const saveDeal = async (d) => { const item = { ...d, id: d.id || genId(), updatedAt: new Date().toISOString() }; if (!d.id) item.createdAt = new Date().toISOString(); await dbPut('deals', item); await loadAll(); return item; };
  const deleteDeal = async (id) => { await dbDelete('deals', id); setDeals(prev => prev.filter(d => d.id !== id)); };
  const saveExpense = async (e) => { const item = { ...e, id: e.id || genId() }; await dbPut('expenses', item); await loadAll(); return item; };
  const deleteExpense = async (id) => { await dbDelete('expenses', id); setExpenses(prev => prev.filter(e => e.id !== id)); };
  const saveProspect = async (p) => { const item = { ...p, id: p.id || genId(), updatedAt: new Date().toISOString() }; if (!p.id) item.createdAt = new Date().toISOString(); await dbPut('prospects', item); await loadAll(); return item; };
  const deleteProspect = async (id) => { await dbDelete('prospects', id); setProspects(prev => prev.filter(p => p.id !== id)); };

  const exportData = () => {
    const data = { vehicles, customers, deals, expenses, prospects, exportDate: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `studiovroom-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const importData = async (file) => {
    const text = await file.text();
    const data = JSON.parse(text);
    if (data.vehicles) for (const v of data.vehicles) await dbPut('vehicles', v);
    if (data.customers) for (const c of data.customers) await dbPut('customers', c);
    if (data.deals) for (const d of data.deals) await dbPut('deals', d);
    if (data.expenses) for (const e of data.expenses) await dbPut('expenses', e);
    if (data.prospects) for (const p of data.prospects) await dbPut('prospects', p);
    await loadAll();
  };

  return (
    <AppContext.Provider value={{ vehicles, customers, deals, expenses, prospects, loading, saveVehicle, deleteVehicle, saveCustomer, deleteCustomer, saveDeal, deleteDeal, saveExpense, deleteExpense, saveProspect, deleteProspect, exportData, importData, loadAll }}>
      {children}
    </AppContext.Provider>
  );
}

function useApp() { return useContext(AppContext); }

// ==================== UTILITY ====================
const fmt = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(n || 0);
const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }) : '-';

// ==================== SHARED COMPONENTS ====================
function Modal({ open, onClose, title, children, wide }) {
  if (!open) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className={`bg-slate-800 rounded-2xl shadow-2xl ${wide ? 'w-full max-w-4xl' : 'w-full max-w-lg'} max-h-[90vh] overflow-y-auto m-4 fade-in`} onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between p-5 border-b border-slate-700">
          <h2 className="text-lg font-semibold text-white">{title}</h2>
          <button onClick={onClose} className="text-slate-400 hover:text-white transition">{Icons.close}</button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}

function Input({ label, ...props }) {
  return (
    <div className="mb-3">
      {label && <label className="block text-sm text-slate-400 mb-1">{label}</label>}
      <input {...props} className="w-full bg-slate-700/50 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-400 transition" />
    </div>
  );
}

function Select({ label, options, ...props }) {
  return (
    <div className="mb-3">
      {label && <label className="block text-sm text-slate-400 mb-1">{label}</label>}
      <select {...props} className="w-full bg-slate-700/50 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-400 transition">
        {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}

    </div>
  );
}

function Textarea({ label, ...props }) {
  return (
    <div className="mb-3">
      {label && <label className="block text-sm text-slate-400 mb-1">{label}</label>}
      <textarea {...props} className="w-full bg-slate-700/50 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-400 transition resize-none" rows={3} />
    </div>
  );
}

function Btn({ children, variant = 'primary', className = '', ...props }) {
  const base = 'px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 disabled:opacity-50';
  const variants = {
    primary: 'bg-brand-500 hover:bg-brand-600 text-white',
    secondary: 'bg-slate-700 hover:bg-slate-600 text-slate-200',
    danger: 'bg-red-500/20 hover:bg-red-500/30 text-red-400',
    ghost: 'hover:bg-slate-700 text-slate-400 hover:text-white',
  };
  return <button className={`${base} ${variants[variant]} ${className}`} {...props}>{children}</button>;
}

function Badge({ status, labels = statusLabels, colors = statusColors }) {
  return <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${colors[status] || 'bg-slate-600 text-slate-300'}`}>{labels[status] || status}</span>;
}

function EmptyState({ icon, title, desc, action }) {
  return (
    <div className="text-center py-16">
      <div className="text-slate-600 flex justify-center mb-4">{icon}</div>
      <h3 className="text-lg font-medium text-slate-400 mb-2">{title}</h3>
      <p className="text-sm text-slate-500 mb-6">{desc}</p>
      {action}

  );

function ConfirmDialog({ open, onClose, onConfirm, title, message }) {
  return (
    <Modal open={open} onClose={onClose} title={title || "Confirm"}>
      <p className="text-slate-300 mb-6">{message}</p>
      <div className="flex justify-end gap-3">
        <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
        <Btn variant="danger" onClick={() => { onConfirm(); onClose(); }}>Delete</Btn>
      </div>

  );
}

// ==================== DASHBOARD ====================
function Dashboard({ onNavigate }) {
  const { vehicles, customers, deals, expenses } = useApp();

  const stats = useMemo(() => {
    const available = vehicles.filter(v => v.status === 'available').length;
    const pending = vehicles.filter(v => v.status === 'pending').length;
    const sold = vehicles.filter(v => v.status === 'sold').length;
    const inService = vehicles.filter(v => v.status === 'in_service').length;
    const totalInventoryValue = vehicles.filter(v => v.status === 'available').reduce((s, v) => s + (parseFloat(v.listingPrice) || 0), 0);
    const totalRevenue = vehicles.filter(v => v.status === 'sold').reduce((s, v) => s + (parseFloat(v.salePrice) || 0), 0);
    const totalCost = vehicles.filter(v => v.status === 'sold').reduce((s, v) => s + (parseFloat(v.purchasePrice) || 0), 0);
    const totalExpenses = expenses.reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);
    const grossProfit = totalRevenue - totalCost;
    const netProfit = grossProfit - totalExpenses;
    const activeDeals = deals.filter(d => !['closed','lost'].includes(d.stage)).length;
    const closedDeals = deals.filter(d => d.stage === 'closed').length;

    return { available, pending, sold, inService, totalInventoryValue, totalRevenue, grossProfit, netProfit, activeDeals, closedDeals, totalCustomers: customers.length, totalVehicles: vehicles.length };
  }, [vehicles, customers, deals, expenses]);

  const monthlyData = useMemo(() => {
    const months = {};
    vehicles.filter(v => v.status === 'sold' && v.saleDate).forEach(v => {
      const m = v.saleDate.slice(0, 7);
      if (!months[m]) months[m] = { month: m, revenue: 0, cost: 0, count: 0 };
      months[m].revenue += parseFloat(v.salePrice) || 0;
      months[m].cost += parseFloat(v.purchasePrice) || 0;
      months[m].count++;
    });
    return Object.values(months).sort((a, b) => a.month.localeCompare(b.month)).slice(-6).map(m => ({
      ...m, profit: m.revenue - m.cost, name: new Date(m.month + '-01').toLocaleDateString('en-US', { month: 'short' })
    }));
  }, [vehicles]);

  const recentVehicles = useMemo(() =>
    [...vehicles].sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || '')).slice(0, 5)
  , [vehicles]);

  const recentDeals = useMemo(() =>
    [...deals].sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || '')).slice(0, 5)
  , [deals]);

  return (
    <div className="fade-in">
      <div className="flex items-center justify-between mb-8">
        <div>
          <h1 className="text-2xl font-bold text-white">Dashboard</h1>
          <p className="text-slate-400 text-sm mt-1">Studio Vroom Dealer Management</p>
        </div>
        <p className="text-sm text-slate-500">{new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}</p>
      </div>

      {/* Stats Grid */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        {[
          { label: 'Total Inventory', value: stats.totalVehicles, sub: `${stats.available} available`, color: 'from-brand-500/20 to-brand-600/10', textColor: 'text-brand-400' },
          { label: 'Inventory Value', value: fmt(stats.totalInventoryValue), sub: `${stats.available} vehicles`, color: 'from-emerald-500/20 to-emerald-600/10', textColor: 'text-emerald-400' },
          { label: 'Total Revenue', value: fmt(stats.totalRevenue), sub: `${stats.sold} sold`, color: 'from-blue-500/20 to-blue-600/10', textColor: 'text-blue-400' },
          { label: 'Net Profit', value: fmt(stats.netProfit), sub: `Gross: ${fmt(stats.grossProfit)}`, color: 'from-amber-500/20 to-amber-600/10', textColor: 'text-amber-400' },
        ].map((s, i) => (
          <div key={i} className={`rounded-xl p-4 bg-gradient-to-br ${s.color} border border-slate-700/50`}>
            <p className="text-xs text-slate-400 mb-1">{s.label}</p>
            <p className={`text-xl font-bold ${s.textColor}`}>{s.value}</p>
            <p className="text-xs text-slate-500 mt-1">{s.sub}</p>
          </div>
        ))}
      </div>

      {/* Secondary Stats */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        {[
          { label: 'Customers', value: stats.totalCustomers, icon: Icons.users },
          { label: 'Active Deals', value: stats.activeDeals, icon: Icons.deal },
          { label: 'Closed Deals', value: stats.closedDeals, icon: Icons.deal },
          { label: 'In Service', value: stats.inService, icon: Icons.car },
        ].map((s, i) => (
          <div key={i} className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4 flex items-center gap-3">
            <div className="text-slate-500">{s.icon}</div>
            <div>
              <p className="text-lg font-semibold text-white">{s.value}</p>
              <p className="text-xs text-slate-400">{s.label}</p>
            </div>
          </div>
        ))}
      </div>

      <div className="grid lg:grid-cols-2 gap-6">
        {/* Monthly Chart */}
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-5">
          <h3 className="text-sm font-medium text-slate-300 mb-4">Monthly Performance</h3>
          {monthlyData.length > 0 ? (
            <Recharts.ResponsiveContainer width="100%" height={220}>
              <Recharts.BarChart data={monthlyData}>
                <Recharts.CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                <Recharts.XAxis dataKey="name" stroke="#64748b" fontSize={12} />
                <Recharts.YAxis stroke="#64748b" fontSize={12} tickFormatter={v => `$${(v/1000).toFixed(0)}k`} />
                <Recharts.Tooltip contentStyle={{ background:'#1e293b', border:'1px solid #334155', borderRadius:'8px', color:'#e2e8f0' }} formatter={(v) => fmt(v)} />
                <Recharts.Bar dataKey="revenue" fill="#6366f1" radius={[4,4,0,0]} name="Revenue" />
                <Recharts.Bar dataKey="profit" fill="#10b981" radius={[4,4,0,0]} name="Profit" />
              </Recharts.BarChart>
            </Recharts.ResponsiveContainer>
          ) : (
            <div className="flex items-center justify-center h-[220px] text-slate-500 text-sm">No sales data yet</div>
          )}
        </div>

        {/* Recent Vehicles */}
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-5">
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-sm font-medium text-slate-300">Recent Inventory</h3>
            <button onClick={() => onNavigate('inventory')} className="text-xs text-brand-400 hover:text-brand-300">View All</button>

          {recentVehicles.length > 0 ? (
            <div className="space-y-3">
              {recentVehicles.map(v => (
                <div key={v.id} className="flex items-center justify-between py-2 border-b border-slate-700/50 last:border-0">
                  <div>
                    <p className="text-sm font-medium text-white">{v.year} {v.make} {v.model}</p>
                    <p className="text-xs text-slate-500">{v.vin || 'No VIN'}</p>
                  </div>
                  <div className="text-right">
                    <p className="text-sm font-medium text-brand-400">{fmt(v.listingPrice)}</p>
                    <Badge status={v.status} />
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div className="flex items-center justify-center h-[180px] text-slate-500 text-sm">No vehicles yet</div>
          )}
        </div>
      </div>

      {/* Recent Deals */}
      {recentDeals.length > 0 && (
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-5 mt-6">
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-sm font-medium text-slate-300">Recent Deals</h3>
            <button onClick={() => onNavigate('deals')} className="text-xs text-brand-400 hover:text-brand-300">View All</button>
          </div>
          <div className="space-y-3">
            {recentDeals.map(d => {
              const v = vehicles.find(v => v.id === d.vehicleId);
              const c = customers.find(c => c.id === d.customerId);
              return (
                <div key={d.id} className="flex items-center justify-between py-2 border-b border-slate-700/50 last:border-0">
                  <div>
                    <p className="text-sm font-medium text-white">{v ? `${v.year} ${v.make} ${v.model}` : 'Unknown Vehicle'}</p>

                  <div className="text-right">
                    <p className="text-sm font-medium text-brand-400">{fmt(d.salePrice)}</p>

          </div>
        </div>
      )}
    </div>
  );
}

function VehicleForm({ vehicle, onSave, onClose }) {
  const [form, setForm] = useState(vehicle || {
    year: '', make: '', model: '', trim: '', vin: '', mileage: '', color: '', interiorColor: '',
    fuelType: 'Gasoline', transmission: 'Automatic', drivetrain: '', bodyType: '',
    purchasePrice: '', listingPrice: '', purchaseDate: '', status: 'available',
    description: '', photos: [], salePrice: '', saleDate: '',
  });

  const handlePhoto = (e) => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        setForm(prev => ({ ...prev, photos: [...(prev.photos || []), ev.target.result] }));
      };
      reader.readAsDataURL(file);
    });
  };

  const removePhoto = (idx) => {
    setForm(prev => ({ ...prev, photos: prev.photos.filter((_, i) => i !== idx) }));
  };

  const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

  return (
    <div>
      {/* Photos */}
      <div className="mb-4">
        <label className="block text-sm text-slate-400 mb-2">Photos</label>
        <div className="flex flex-wrap gap-2 mb-2">
          {(form.photos || []).map((p, i) => (
            <div key={i} className="relative w-20 h-20 rounded-lg overflow-hidden group">
              <img src={p} className="w-full h-full object-cover" />
              <button onClick={() => removePhoto(i)} className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition text-red-400">{Icons.trash}</button>
            </div>
          ))}
          <label className="w-20 h-20 rounded-lg border-2 border-dashed border-slate-600 flex items-center justify-center cursor-pointer hover:border-brand-400 transition text-slate-500 hover:text-brand-400">
            {Icons.camera}
            <input type="file" accept="image/*" multiple onChange={handlePhoto} />
          </label>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3">
        <Input label="Year" type="number" value={form.year} onChange={e => set('year', e.target.value)} placeholder="2024" />
        <Input label="Make" value={form.make} onChange={e => set('make', e.target.value)} placeholder="BMW" />
        <Input label="Model" value={form.model} onChange={e => set('model', e.target.value)} placeholder="M4" />
        <Input label="Trim" value={form.trim} onChange={e => set('trim', e.target.value)} placeholder="Competition" />
        <div className="col-span-2"><Input label="VIN" value={form.vin} onChange={e => set('vin', e.target.value)} placeholder="Vehicle Identification Number" /></div>
        <Input label="Mileage" type="number" value={form.mileage} onChange={e => set('mileage', e.target.value)} placeholder="0" />
        <Input label="Exterior Color" value={form.color} onChange={e => set('color', e.target.value)} placeholder="Black Sapphire" />
        <Input label="Interior Color" value={form.interiorColor} onChange={e => set('interiorColor', e.target.value)} placeholder="Cognac" />
        <Select label="Fuel Type" value={form.fuelType} onChange={e => set('fuelType', e.target.value)} options={[{value:'Gasoline',label:'Gasoline'},{value:'Diesel',label:'Diesel'},{value:'Electric',label:'Electric'},{value:'Hybrid',label:'Hybrid'}]} />
        <Select label="Transmission" value={form.transmission} onChange={e => set('transmission', e.target.value)} options={[{value:'Automatic',label:'Automatic'},{value:'Manual',label:'Manual'},{value:'CVT',label:'CVT'}]} />
        <Input label="Drivetrain" value={form.drivetrain} onChange={e => set('drivetrain', e.target.value)} placeholder="AWD / RWD / FWD" />
        <Select label="Body Type" value={form.bodyType || ''} onChange={e => set('bodyType', e.target.value)} options={[{value:'',label:'Select...'},{value:'Sedan',label:'Sedan'},{value:'SUV',label:'SUV'},{value:'Coupe',label:'Coupe'},{value:'Truck',label:'Truck'},{value:'Van',label:'Van'},{value:'Convertible',label:'Convertible'},{value:'Hatchback',label:'Hatchback'},{value:'Wagon',label:'Wagon'}]} />
        <Input label="Purchase Price ($)" type="number" value={form.purchasePrice} onChange={e => set('purchasePrice', e.target.value)} placeholder="0" />
        <Input label="Listing Price ($)" type="number" value={form.listingPrice} onChange={e => set('listingPrice', e.target.value)} placeholder="0" />
        <Input label="Purchase Date" type="date" value={form.purchaseDate} onChange={e => set('purchaseDate', e.target.value)} />
        <Select label="Status" value={form.status} onChange={e => set('status', e.target.value)} options={[{value:'available',label:'Available'},{value:'pending',label:'Pending'},{value:'sold',label:'Sold'},{value:'in_service',label:'In Service'}]} />
        {form.status === 'sold' && <>
          <Input label="Sale Price ($)" type="number" value={form.salePrice} onChange={e => set('salePrice', e.target.value)} placeholder="0" />
          <Input label="Sale Date" type="date" value={form.saleDate} onChange={e => set('saleDate', e.target.value)} />
        </>}
      </div>
      <Textarea label="Description / Notes" value={form.description} onChange={e => set('description', e.target.value)} placeholder="Vehicle description, features, condition notes..." />
      <div className="flex justify-end gap-3 mt-4">
        <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
        <Btn onClick={() => onSave(form)}>{vehicle?.id ? 'Update Vehicle' : 'Add Vehicle'}</Btn>
      </div>
    </div>
  );
}

function Inventory() {
  const { vehicles, saveVehicle, deleteVehicle } = useApp();
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [showForm, setShowForm] = useState(false);
  const [editVehicle, setEditVehicle] = useState(null);
  const [viewVehicle, setViewVehicle] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);

  const filtered = useMemo(() => {
    let list = [...vehicles];
    if (filter !== 'all') list = list.filter(v => v.status === filter);
    if (search) {
      const s = search.toLowerCase();
      list = list.filter(v => `${v.year} ${v.make} ${v.model} ${v.trim} ${v.vin} ${v.color}`.toLowerCase().includes(s));
    }
    return list.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
  }, [vehicles, search, filter]);

  const handleSave = async (form) => {
    await saveVehicle(form);
    setShowForm(false); setEditVehicle(null);
  };

  return (
    <div className="fade-in">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white">Inventory</h1>
          <p className="text-slate-400 text-sm">{vehicles.length} vehicles total</p>
        </div>
        <Btn onClick={() => { setEditVehicle(null); setShowForm(true); }}>{Icons.plus} Add Vehicle</Btn>
      </div>

      {/* Filters */}
      <div className="flex flex-col sm:flex-row gap-3 mb-6">
        <div className="relative flex-1">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">{Icons.search}</span>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search vehicles..." className="w-full bg-slate-800/50 border border-slate-700 rounded-lg pl-10 pr-4 py-2 text-white text-sm focus:outline-none focus:border-brand-400" />
        </div>
        <div className="flex gap-2 flex-wrap">
          {[{v:'all',l:'All'},{v:'available',l:'Available'},{v:'pending',l:'Pending'},{v:'sold',l:'Sold'},{v:'in_service',l:'In Service'}].map(f => (
            <button key={f.v} onClick={() => setFilter(f.v)} className={`px-3 py-1.5 rounded-lg text-sm transition ${filter === f.v ? 'bg-brand-500 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>{f.l}</button>
          ))}
        </div>
      </div>

      {/* Vehicle List */}
      {filtered.length > 0 ? (
        <div className="grid gap-4">
          {filtered.map(v => (
            <div key={v.id} className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4 hover:border-slate-600 transition cursor-pointer" onClick={() => setViewVehicle(v)}>
              <div className="flex gap-4">
                {v.photos?.[0] ? (
                  <img src={v.photos[0]} className="w-24 h-20 rounded-lg object-cover flex-shrink-0" />
                ) : (
                  <div className="w-24 h-20 rounded-lg bg-slate-700 flex items-center justify-center text-slate-500 flex-shrink-0">{Icons.car}</div>
                )}
                <div className="flex-1 min-w-0">
                  <div className="flex items-start justify-between gap-2">
                    <div>
                      <h3 className="text-white font-medium">{v.year} {v.make} {v.model} {v.trim}</h3>
                      <p className="text-xs text-slate-500 mt-0.5">{v.vin || 'No VIN'} · {v.mileage ? `${parseInt(v.mileage).toLocaleString()} mi` : '-'} · {v.color || '-'}</p>
                    </div>
                    <Badge status={v.status} />
                  </div>
                  <div className="flex items-center gap-4 mt-2">
                    <span className="text-sm text-slate-400">Buy: {fmt(v.purchasePrice)}</span>
                    <span className="text-sm font-medium text-brand-400">List: {fmt(v.listingPrice)}</span>
                    {v.status === 'sold' && <span className="text-sm font-medium text-emerald-400">Sold: {fmt(v.salePrice)}</span>}
                  </div>
                </div>
                <div className="flex items-center gap-1 flex-shrink-0">
                  <button onClick={(e) => { e.stopPropagation(); setEditVehicle(v); setShowForm(true); }} className="p-2 text-slate-500 hover:text-brand-400 transition">{Icons.edit}</button>
                  <button onClick={(e) => { e.stopPropagation(); setDeleteConfirm(v); }} className="p-2 text-slate-500 hover:text-red-400 transition">{Icons.trash}</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      ) : (
        <EmptyState icon={Icons.car} title="No vehicles found" desc={search || filter !== 'all' ? 'Try adjusting your search or filters' : 'Add your first vehicle to get started'} action={!search && filter === 'all' && <Btn onClick={() => setShowForm(true)}>{Icons.plus} Add Vehicle</Btn>} />
      )}

      <Modal open={showForm} onClose={() => { setShowForm(false); setEditVehicle(null); }} title={editVehicle ? 'Edit Vehicle' : 'Add Vehicle'} wide>
        <VehicleForm vehicle={editVehicle} onSave={handleSave} onClose={() => { setShowForm(false); setEditVehicle(null); }} />

// ==================== FINANCE ====================
function Finance() {
  const { vehicles, expenses } = useApp();

  const data = useMemo(() => {
    const soldVehicles = vehicles.filter(v => v.status === 'sold');
    const totalRevenue = soldVehicles.reduce((s, v) => s + (parseFloat(v.salePrice) || 0), 0);
    const totalCost = soldVehicles.reduce((s, v) => s + (parseFloat(v.purchasePrice) || 0), 0);
    const totalExpenses = expenses.reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);
    const grossProfit = totalRevenue - totalCost;
    const netProfit = grossProfit - totalExpenses;
    const avgMargin = soldVehicles.length > 0 ? grossProfit / soldVehicles.length : 0;

    const inventoryValue = vehicles.filter(v => v.status === 'available').reduce((s, v) => s + (parseFloat(v.listingPrice) || 0), 0);
    const inventoryCost = vehicles.filter(v => v.status === 'available').reduce((s, v) => s + (parseFloat(v.purchasePrice) || 0), 0);

    // Per-vehicle profit analysis
    const vehicleProfit = soldVehicles.map(v => {
      const vExp = expenses.filter(e => e.vehicleId === v.id).reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);
      const profit = (parseFloat(v.salePrice) || 0) - (parseFloat(v.purchasePrice) || 0) - vExp;
      return { ...v, totalExpenses: vExp, profit };
    }).sort((a, b) => b.profit - a.profit);

    // Monthly data
    const months = {};
    soldVehicles.forEach(v => {
      const m = (v.saleDate || v.updatedAt || '').slice(0, 7);
      if (!m) return;
      if (!months[m]) months[m] = { month: m, revenue: 0, cost: 0, expenses: 0, count: 0 };
      months[m].revenue += parseFloat(v.salePrice) || 0;
      months[m].cost += parseFloat(v.purchasePrice) || 0;
      months[m].count++;
    });
    expenses.forEach(e => {
      const m = (e.date || '').slice(0, 7);
      if (!m || !months[m]) return;
      months[m].expenses += parseFloat(e.amount) || 0;
    });
    const monthlyData = Object.values(months).sort((a, b) => a.month.localeCompare(b.month)).map(m => ({
      ...m, profit: m.revenue - m.cost - m.expenses, name: new Date(m.month + '-01').toLocaleDateString('en-US', { month: 'short', year: '2-digit' })
    }));

    // Expense breakdown
    const expByCategory = {};
    expenses.forEach(e => {
      const cat = e.category || 'other';
      expByCategory[cat] = (expByCategory[cat] || 0) + (parseFloat(e.amount) || 0);
    });

    return { totalRevenue, totalCost, totalExpenses, grossProfit, netProfit, avgMargin, inventoryValue, inventoryCost, vehicleProfit, monthlyData, expByCategory, soldCount: soldVehicles.length };
  }, [vehicles, expenses]);

  const expColors = { repair:'#ef4444', parts:'#f59e0b', detailing:'#6366f1', inspection:'#10b981', transport:'#3b82f6', other:'#64748b' };

  return (
    <div className="fade-in">
      <h1 className="text-2xl font-bold text-white mb-2">Financial Overview</h1>
      <p className="text-slate-400 text-sm mb-8">Complete financial analysis of your dealership</p>

      {/* Summary Cards */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        {[
          { label: 'Total Revenue', value: fmt(data.totalRevenue), color: 'text-blue-400' },
          { label: 'Gross Profit', value: fmt(data.grossProfit), color: 'text-emerald-400' },
          { label: 'Total Expenses', value: fmt(data.totalExpenses), color: 'text-red-400' },
          { label: 'Net Profit', value: fmt(data.netProfit), color: data.netProfit >= 0 ? 'text-emerald-400' : 'text-red-400' },
        ].map((s, i) => (
          <div key={i} className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
            <p className="text-xs text-slate-500">{s.label}</p>
            <p className={`text-xl font-bold ${s.color} mt-1`}>{s.value}</p>
          </div>
        ))}
      </div>

      {/* More Stats */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
          <p className="text-xs text-slate-500">Vehicles Sold</p>
          <p className="text-xl font-bold text-white mt-1">{data.soldCount}</p>
        </div>
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
          <p className="text-xs text-slate-500">Avg Margin / Vehicle</p>
          <p className="text-xl font-bold text-brand-400 mt-1">{fmt(data.avgMargin)}</p>
        </div>
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
          <p className="text-xs text-slate-500">Inventory Value (List)</p>
          <p className="text-xl font-bold text-white mt-1">{fmt(data.inventoryValue)}</p>
        </div>
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
          <p className="text-xs text-slate-500">Inventory Cost</p>
          <p className="text-xl font-bold text-amber-400 mt-1">{fmt(data.inventoryCost)}</p>
        </div>
      </div>

      <div className="grid lg:grid-cols-2 gap-6 mb-8">
        {/* Monthly Chart */}
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-5">
          <h3 className="text-sm font-medium text-slate-300 mb-4">Monthly Revenue & Profit</h3>
          {data.monthlyData.length > 0 ? (
            <Recharts.ResponsiveContainer width="100%" height={250}>
              <Recharts.BarChart data={data.monthlyData}>
                <Recharts.CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                <Recharts.XAxis dataKey="name" stroke="#64748b" fontSize={12} />
                <Recharts.YAxis stroke="#64748b" fontSize={12} tickFormatter={v => `$${(v/1000).toFixed(0)}k`} />
                <Recharts.Tooltip contentStyle={{ background:'#1e293b', border:'1px solid #334155', borderRadius:'8px', color:'#e2e8f0' }} formatter={v => fmt(v)} />
                <Recharts.Legend />
                <Recharts.Bar dataKey="revenue" fill="#3b82f6" name="Revenue" radius={[4,4,0,0]} />
                <Recharts.Bar dataKey="profit" fill="#10b981" name="Net Profit" radius={[4,4,0,0]} />
              </Recharts.BarChart>
            </Recharts.ResponsiveContainer>
          ) : <div className="h-[250px] flex items-center justify-center text-slate-500 text-sm">No data yet</div>}
        </div>

        {/* Expense Breakdown */}
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-5">
          <h3 className="text-sm font-medium text-slate-300 mb-4">Expense Breakdown</h3>
          {Object.keys(data.expByCategory).length > 0 ? (
            <div className="space-y-3">
              {Object.entries(data.expByCategory).sort((a,b) => b[1] - a[1]).map(([cat, amount]) => {
                const pct = data.totalExpenses > 0 ? (amount / data.totalExpenses * 100) : 0;
                return (
                  <div key={cat}>
                    <div className="flex justify-between text-sm mb-1">
                      <span className="text-slate-300 capitalize">{cat}</span>
                      <span className="text-slate-400">{fmt(amount)} ({pct.toFixed(0)}%)</span>
                    </div>
                    <div className="w-full bg-slate-700 rounded-full h-2">
                      <div className="h-2 rounded-full transition-all" style={{ width: `${pct}%`, background: expColors[cat] || '#64748b' }} />
                    </div>
                  </div>
                );
              })}
            </div>
          ) : <div className="h-[200px] flex items-center justify-center text-slate-500 text-sm">No expenses recorded</div>}
        </div>
      </div>

      {/* Per-Vehicle Profit Table */}
      {data.vehicleProfit.length > 0 && (
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-5">
          <h3 className="text-sm font-medium text-slate-300 mb-4">Profit by Vehicle (Sold)</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b border-slate-700">
                  <th className="text-left text-slate-500 py-2 pr-4 font-medium">Vehicle</th>
                  <th className="text-right text-slate-500 py-2 px-2 font-medium">Purchase</th>
                  <th className="text-right text-slate-500 py-2 px-2 font-medium">Sale</th>
                  <th className="text-right text-slate-500 py-2 px-2 font-medium">Expenses</th>
                  <th className="text-right text-slate-500 py-2 pl-2 font-medium">Profit</th>
                </tr>
              </thead>
              <tbody>
                {data.vehicleProfit.map(v => (
                  <tr key={v.id} className="border-b border-slate-700/50">
                    <td className="py-2 pr-4 text-white">{v.year} {v.make} {v.model}</td>
                    <td className="py-2 px-2 text-right text-slate-400">{fmt(v.purchasePrice)}</td>
                    <td className="py-2 px-2 text-right text-blue-400">{fmt(v.salePrice)}</td>
                    <td className="py-2 px-2 text-right text-red-400">{fmt(v.totalExpenses)}</td>
                    <td className={`py-2 pl-2 text-right font-bold ${v.profit >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{fmt(v.profit)}</td>

                ))}

          </div>

  parts.push('.condition{background:#0f172a;border-radius:8px;padding:8px 12px;margin-top:10px;font-size:13px;color:#cbd5e1}.notes{color:#94a3b8;font-size:13px;margin-top:8px}');
  parts.push('.link{color:#818cf8;font-size:13px;margin-top:8px;display:inline-block;text-decoration:none}.link:hover{color:#a5b4fc}');
  parts.push('.footer{text-align:center;color:#475569;font-size:12px;padding:30px 0}');
  parts.push('.flex-between{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}');
  parts.push('@media(max-width:640px){.card-photos img{height:160px}}</style></head>');

  parts.push('<div class="sub">Curated Vehicle Picks - ' + rangeLabel + '</div>');

  parts.push('<div id="cards"></div><div class="footer">Studio Vroom - Finding the Right Cars for You<br>Contact us for any of these vehicles</div></div>');
  parts.push('<script>');
  parts.push('var data=JSON.parse(decodeURIComponent(escape(atob("' + encoded + '"))));');
  parts.push('var fmt=function(n){return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n||0)};');
  parts.push('var pLabels={hot:"Hot Pick",warm:"Warm",cool:"Cool"};');
  parts.push('var el=document.getElementById("cards");');
  parts.push('data.forEach(function(p){var photos=(p.ph||[]).map(function(s){return \'<img src="\'+s+\'">\';}).join("");');
  parts.push('var html="<div class=\\"card\\">";');
  parts.push('if(photos)html+="<div class=\\"card-photos\\">"+photos+"</div>";');
  parts.push('html+="<div class=\\"card-body\\"><div class=\\"flex-between\\"><div><div class=\\"card-title\\">"+p.y+" "+p.mk+" "+p.md+" "+(p.tr||"")+"</div>";');
  parts.push('html+="<div class=\\"card-meta\\">"+(p.mi?parseInt(p.mi).toLocaleString()+" mi":"")+(p.mi&&p.cl?" . ":"")+(p.cl||"")+"</div></div>";');
  parts.push('html+="<div style=\\"text-align:right\\"><div class=\\"card-price\\">"+fmt(p.pr)+"</div><span class=\\"badge "+p.pi+"\\">"+((pLabels[p.pi])||"")+"</span></div></div>";');
  parts.push('if(p.co)html+="<div class=\\"condition\\">"+p.co+"</div>";');
  parts.push('if(p.no)html+="<div class=\\"notes\\">"+p.no+"</div>";');
  parts.push('if(p.url)html+="<a href=\\""+p.url+"\\" target=\\"_blank\\" class=\\"link\\">View Full Listing</a>";');
  parts.push('html+="</div></div>";el.innerHTML+=html;});');
  parts.push('<\/script></body></html>');
  return parts.join('\n');
}

const priorityColors = { hot: 'bg-red-500/20 text-red-400', warm: 'bg-amber-500/20 text-amber-400', cool: 'bg-blue-500/20 text-blue-400' };
const priorityLabels = { hot: 'Hot Pick', warm: 'Warm', cool: 'Cool' };

function ProspectForm({ prospect, onSave, onClose }) {
  const [form, setForm] = useState(prospect || {
    year: '', make: '', model: '', trim: '', expectedPrice: '', mileage: '',
    color: '', listingUrl: '', source: '', priority: 'warm',
    photos: [], notes: '', condition: '',
  });
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const handlePhoto = (e) => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        setForm(prev => ({ ...prev, photos: [...(prev.photos || []), ev.target.result] }));
      };
      reader.readAsDataURL(file);
    });
  };

  const removePhoto = (idx) => {
    setForm(prev => ({ ...prev, photos: prev.photos.filter((_, i) => i !== idx) }));
  };

  return (
    <div>
      {/* Photos */}
      <div className="mb-4">
        <label className="block text-sm text-slate-400 mb-2">Photos</label>
        <div className="flex flex-wrap gap-2 mb-2">
          {(form.photos || []).map((p, i) => (
            <div key={i} className="relative w-20 h-20 rounded-lg overflow-hidden group">
              <img src={p} className="w-full h-full object-cover" />
              <button onClick={() => removePhoto(i)} className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition text-red-400">{Icons.trash}</button>
            </div>
          ))}
          <label className="w-20 h-20 rounded-lg border-2 border-dashed border-slate-600 flex items-center justify-center cursor-pointer hover:border-brand-400 transition text-slate-500 hover:text-brand-400">
            {Icons.camera}
            <input type="file" accept="image/*" multiple onChange={handlePhoto} />
          </label>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3">
        <Input label="Year" type="number" value={form.year} onChange={e => set('year', e.target.value)} placeholder="2024" />
        <Input label="Make" value={form.make} onChange={e => set('make', e.target.value)} placeholder="BMW" />
        <Input label="Model" value={form.model} onChange={e => set('model', e.target.value)} placeholder="M4" />
        <Input label="Trim" value={form.trim} onChange={e => set('trim', e.target.value)} placeholder="Competition" />
        <Input label="Expected Price ($)" type="number" value={form.expectedPrice} onChange={e => set('expectedPrice', e.target.value)} placeholder="15000" />
        <Input label="Mileage" type="number" value={form.mileage} onChange={e => set('mileage', e.target.value)} placeholder="50000" />
        <Input label="Exterior Color" value={form.color} onChange={e => set('color', e.target.value)} placeholder="Black" />
        <Select label="Priority" value={form.priority} onChange={e => set('priority', e.target.value)} options={[{value:'hot',label:'Hot Pick'},{value:'warm',label:'Warm'},{value:'cool',label:'Cool'}]} />
        <div className="col-span-2"><Input label="Listing URL (Autotrader, Carfax, etc.)" value={form.listingUrl} onChange={e => set('listingUrl', e.target.value)} placeholder="https://..." /></div>
        <div className="col-span-2">
          <Select label="Source" value={form.source || ''} onChange={e => set('source', e.target.value)} options={[{value:'',label:'Select...'},{value:'autotrader',label:'Autotrader'},{value:'carfax',label:'Carfax'},{value:'cargurus',label:'CarGurus'},{value:'facebook',label:'Facebook Marketplace'},{value:'craigslist',label:'Craigslist'},{value:'auction',label:'Auction'},{value:'trade_in',label:'Trade-in'},{value:'other',label:'Other'}]} />
        </div>
      </div>
      <Input label="Condition Summary" value={form.condition} onChange={e => set('condition', e.target.value)} placeholder="Clean title, no accidents, well maintained..." />
      <Textarea label="Notes / Recommendation" value={form.notes} onChange={e => set('notes', e.target.value)} placeholder="Why this is a good pick, features, things to note for the customer..." />
      <div className="flex justify-end gap-3 mt-4">
        <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
        <Btn onClick={() => onSave(form)}>{prospect?.id ? 'Update' : 'Add Prospect'}</Btn>

  );
}

function Prospects() {
  const { prospects, saveProspect, deleteProspect } = useApp();
  const [search, setSearch] = useState('');
  const [priceFilter, setPriceFilter] = useState('all');
  const [showForm, setShowForm] = useState(false);
  const [editProspect, setEditProspect] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [showShareView, setShowShareView] = useState(false);

  const filtered = useMemo(() => {
    let list = [...prospects];
    if (priceFilter !== 'all') {
      const range = PRICE_RANGES.find(r => r.value === priceFilter);
      if (range) {
        list = list.filter(p => {
          const price = parseFloat(p.expectedPrice) || 0;
          return price >= range.min && price < range.max;
        });
      }
    }
    if (search) {
      const s = search.toLowerCase();
      list = list.filter(p => `${p.year} ${p.make} ${p.model} ${p.trim} ${p.color}`.toLowerCase().includes(s));
    }
    return list.sort((a, b) => {
      const priorityOrder = { hot: 0, warm: 1, cool: 2 };
      const pa = priorityOrder[a.priority] ?? 1;
      const pb = priorityOrder[b.priority] ?? 1;
      if (pa !== pb) return pa - pb;
      return (b.createdAt || '').localeCompare(a.createdAt || '');
    });
  }, [prospects, search, priceFilter]);

  const handleSave = async (form) => {
    await saveProspect(form);
    setShowForm(false); setEditProspect(null);
  };

  const priceRangeCounts = useMemo(() => {
    const counts = {};
    PRICE_RANGES.forEach(r => {
      if (r.value === 'all') { counts[r.value] = prospects.length; return; }
      counts[r.value] = prospects.filter(p => {
        const price = parseFloat(p.expectedPrice) || 0;
        return price >= r.min && price < r.max;
      }).length;
    });
    return counts;
  }, [prospects]);

  return (
    <div className="fade-in">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white">Prospect List</h1>
          <p className="text-slate-400 text-sm">{prospects.length} candidate vehicles for customers</p>
        </div>
        <div className="flex gap-2">
          {filtered.length > 0 && (
            <Btn variant="secondary" onClick={() => setShowShareView(true)}>{Icons.share} Customer View</Btn>
          )}
          <Btn onClick={() => { setEditProspect(null); setShowForm(true); }}>{Icons.plus} Add Prospect</Btn>
        </div>
      </div>

      {/* Price Range Filters */}
      <div className="mb-4">
        <p className="text-xs text-slate-500 mb-2">Filter by Price Range</p>
        <div className="flex gap-2 flex-wrap">
          {PRICE_RANGES.map(r => (
            <button key={r.value} onClick={() => setPriceFilter(r.value)} className={`px-3 py-1.5 rounded-lg text-sm transition ${priceFilter === r.value ? 'bg-brand-500 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
              {r.label} {priceRangeCounts[r.value] > 0 && <span className="ml-1 text-xs opacity-70">({priceRangeCounts[r.value]})</span>}
            </button>
          ))}
        </div>
      </div>

      {/* Search */}
      <div className="relative mb-6">
        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">{Icons.search}</span>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search prospects..." className="w-full bg-slate-800/50 border border-slate-700 rounded-lg pl-10 pr-4 py-2 text-white text-sm focus:outline-none focus:border-brand-400" />
      </div>

      {/* Prospect Cards */}
      {filtered.length > 0 ? (
        <div className="grid gap-4">
          {filtered.map(p => (
            <div key={p.id} className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4 hover:border-slate-600 transition">
              <div className="flex gap-4">
                {p.photos?.[0] ? (
                  <img src={p.photos[0]} className="w-28 h-24 rounded-lg object-cover flex-shrink-0" />
                ) : (
                  <div className="w-28 h-24 rounded-lg bg-slate-700 flex items-center justify-center text-slate-500 flex-shrink-0">{Icons.car}</div>
                )}
                <div className="flex-1 min-w-0">
                  <div className="flex items-start justify-between gap-2">
                    <div>
                      <h3 className="text-white font-medium">{p.year} {p.make} {p.model} {p.trim}</h3>
                      <div className="flex items-center gap-3 mt-0.5 text-xs text-slate-500">
                        {p.mileage && <span>{parseInt(p.mileage).toLocaleString()} mi</span>}
                        {p.color && <span>{p.color}</span>}
                        {p.source && <span className="capitalize">{p.source.replace('_',' ')}</span>}
                      </div>
                    </div>
                    <div className="text-right flex-shrink-0">
                      <p className="text-lg font-bold text-brand-400">{fmt(p.expectedPrice)}</p>
                      <Badge status={p.priority} labels={priorityLabels} colors={priorityColors} />
                    </div>
                  </div>
                  {p.condition && <p className="text-xs text-slate-400 mt-1">{p.condition}</p>}
                  {p.notes && <p className="text-xs text-slate-500 mt-1 line-clamp-2">{p.notes}</p>}
                  <div className="flex items-center gap-3 mt-2">
                    {p.listingUrl && <a href={p.listingUrl} target="_blank" rel="noopener noreferrer" className="flex items-center gap-1 text-xs text-brand-400 hover:text-brand-300" onClick={e => e.stopPropagation()}>{Icons.link} Listing</a>}
                  </div>
                </div>
                <div className="flex flex-col items-center gap-1 flex-shrink-0">
                  <button onClick={() => { setEditProspect(p); setShowForm(true); }} className="p-2 text-slate-500 hover:text-brand-400 transition">{Icons.edit}</button>
                  <button onClick={() => setDeleteConfirm(p)} className="p-2 text-slate-500 hover:text-red-400 transition">{Icons.trash}</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      ) : (
        <EmptyState icon={Icons.list} title="No prospects found" desc={search || priceFilter !== 'all' ? 'Try adjusting your search or price range' : 'Add candidate vehicles to share with customers'} action={!search && priceFilter === 'all' && <Btn onClick={() => setShowForm(true)}>{Icons.plus} Add Prospect</Btn>} />
      )}

      {/* Add/Edit Modal */}
      <Modal open={showForm} onClose={() => { setShowForm(false); setEditProspect(null); }} title={editProspect ? 'Edit Prospect' : 'Add Prospect'} wide>
        <ProspectForm prospect={editProspect} onSave={handleSave} onClose={() => { setShowForm(false); setEditProspect(null); }} />
      </Modal>

      {/* Customer Share View Modal */}
      <Modal open={showShareView} onClose={() => setShowShareView(false)} title="Customer View Preview" wide>
        <div className="mb-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
          <p className="text-sm text-slate-400">This is how your customer will see the list.</p>
          <Btn variant="secondary" onClick={() => {
            var rangeLabel = PRICE_RANGES.find(function(r) { return r.value === priceFilter; });
            rangeLabel = rangeLabel ? rangeLabel.label : 'All';
            var pageHtml = generateSharePageHtml(filtered, rangeLabel);
            var blob = new Blob([pageHtml], { type: 'text/html' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a'); a.href = url;
            var suffix = priceFilter === 'all' ? 'all' : priceFilter.replace('+', 'plus') + 'k';
            a.download = 'studio-vroom-picks-' + suffix + '.html';
            a.click(); URL.revokeObjectURL(url);
          }}>{Icons.download} Download as Share Page</Btn>
        </div>
        <ProspectShareView prospects={filtered} priceRange={priceFilter} />
      </Modal>

      <ConfirmDialog open={!!deleteConfirm} onClose={() => setDeleteConfirm(null)} onConfirm={() => deleteProspect(deleteConfirm.id)} title="Delete Prospect" message={`Remove ${deleteConfirm?.year} ${deleteConfirm?.make} ${deleteConfirm?.model} from the prospect list?`} />
    </div>
  );
}

          <span className="text-white font-semibold">Studio Vroom DMS</span>
        </div>

        {/* Sidebar Overlay */}
        {sidebarOpen && <div className="lg:hidden fixed inset-0 bg-black/50 z-40" onClick={() => setSidebarOpen(false)} />}

        {/* Sidebar */}
        <aside className={`fixed lg:relative z-50 h-full w-64 bg-slate-900 border-r border-slate-800 flex flex-col transition-transform lg:translate-x-0 no-print ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
          <div className="p-5 flex items-center gap-3 border-b border-slate-800">
            <span className="text-brand-400">{Icons.crown}</span>
            <div>
              <h1 className="text-white font-bold text-lg leading-tight">Studio Vroom</h1>
              <p className="text-xs text-slate-500">Dealer Management</p>
            </div>
          </div>

          <nav className="flex-1 py-4">
            {navItems.map(item => (
              <button key={item.id} onClick={() => navigate(item.id)} className={`w-full flex items-center gap-3 px-5 py-2.5 text-sm transition ${page === item.id ? 'sidebar-active text-white font-medium' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'}`}>
                {item.icon}
                {item.label}
              </button>
            ))}
          </nav>

          <div className="p-4 border-t border-slate-800">
            <p className="text-xs text-slate-600 text-center">v1.0 · Data stored locally</p>
          </div>
        </aside>

        {/* Main Content */}
        <main className="flex-1 overflow-y-auto pt-14 lg:pt-0">
          <div className="p-4 lg:p-8 max-w-6xl mx-auto">
            {page === 'dashboard' && <Dashboard onNavigate={navigate} />}
            {page === 'inventory' && <Inventory />}
            {page === 'prospects' && <Prospects />}
            {page === 'customers' && <Customers />}
            {page === 'deals' && <Deals />}
            {page === 'finance' && <Finance />}
            {page === 'settings' && <Settings />}
          </div>
        </main>
      </div>
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
